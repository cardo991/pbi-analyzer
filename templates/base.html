<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('app_title') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script>
        // Apply saved theme before render to avoid flash
        (function(){
            var t = localStorage.getItem('gp-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index', lang=lang) }}">
                <img src="{{ url_for('static', filename='img/ypf-logo.svg') }}" alt="YPF" class="navbar-logo me-2">
                <span class="brand-separator me-2"></span>
                <span>{{ t('app_title') }}</span>
            </a>
            <div class="d-flex align-items-center gap-2">
                <a href="{{ url_for('history', lang=lang) }}" class="btn-ghost btn-sm" style="font-size:0.78rem;">
                    <i class="bi bi-clock-history me-1"></i>{{ t('history_title') }}
                </a>
                <button class="theme-toggle" id="theme-toggle" title="{{ t('theme_toggle') }}">
                    <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                </button>
                <a href="?lang=en" class="btn-lang {{ 'active' if lang == 'en' }}">EN</a>
                <a href="?lang=es" class="btn-lang {{ 'active' if lang == 'es' }}">ES</a>
                <a href="?lang=pt" class="btn-lang {{ 'active' if lang == 'pt' }}">PT</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-3 mt-5">
        <div class="container text-center">
            <small style="color:var(--text-3);">GridPulse &mdash; Power BI Intelligence Platform</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
    <script>
        // Theme toggle
        (function(){
            var btn = document.getElementById('theme-toggle');
            var icon = document.getElementById('theme-icon');
            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('gp-theme', theme);
                icon.className = theme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            }
            applyTheme(localStorage.getItem('gp-theme') || 'dark');
            btn.addEventListener('click', function(){
                var current = document.documentElement.getAttribute('data-theme');
                applyTheme(current === 'dark' ? 'light' : 'dark');
            });
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
